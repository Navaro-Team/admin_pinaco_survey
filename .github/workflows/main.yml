name: Deploy to Production

on:
  push:
    branches: [ "main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout source
      # -------------------------
      - name: Check out code
        uses: actions/checkout@v3

      # -------------------------
      # 2. Generate ENV
      # -------------------------
      - name: Create .env file
        run: echo "${{ secrets.ENV_MAIN }}" > .env
      # -------------------------
      # 3. Install + Build BEFORE deploying
      # -------------------------
      - name: Install dependencies
        run: | 
          npm install

      - name: Build project (stop if fails)
        run: |
          npm run build
      # -------------------------
      # 4. Setup SSH keys
      # -------------------------
      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # -------------------------
      # 5. Deploy (PM2)
      # -------------------------
      - name: Deploy
        run: |
          echo "Deploy and running PM2"
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" --delete --exclude 'node_modules' --exclude '.git' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/googlead/admin_pinaco_survey
          
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd /home/googlead/admin_pinaco_survey &&
            npm install &&
            (pm2 delete pinaco-admin || true) &&
            pm2 start "npm run start" --name pinaco-admin &&
            pm2 save
          '
